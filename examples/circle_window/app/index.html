<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Circle Window</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }
    body {
      display: flex; align-items: center; justify-content: center;
    }
    .circle {
      width: 360px; height: 360px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
    }
    h1 {
      color: #e0e0e0; font-family: -apple-system, sans-serif;
      font-size: 1.4rem; font-weight: 600;
      user-select: none;
    }
    .close-btn {
      width: 56px; height: 56px; border-radius: 50%;
      border: 2px solid #e74c3c; background: transparent;
      color: #e74c3c; font-size: 1.8rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
      line-height: 1;
      user-select: none;
    }
    .close-btn:hover { background: #e74c3c; color: #fff; }
    .hint {
      color: #666; font-size: 0.75rem;
      font-family: -apple-system, sans-serif;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="circle">
    <h1>Drag Me</h1>
    <button class="close-btn" id="closeBtn">&times;</button>
    <span class="hint">click outside button to drag</span>
  </div>
  <script src="main.js"></script>
</body>
</html>

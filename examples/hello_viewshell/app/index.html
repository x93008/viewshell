<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello Viewshell</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #0f0f1a; color: #e0e0e0;
    }
    .card {
      width: min(720px, calc(100vw - 2rem));
      text-align: center; padding: 3rem 2.5rem;
      background: #1a1a2e; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    h1 span { color: #7c6ef0; }
    p { font-size: 1.1rem; color: #999; margin-bottom: 1.25rem; }
    .status { font-size: 0.95rem; color: #5ecc72; margin-bottom: 1.5rem; }
    .actions {
      display: flex; gap: 0.75rem; justify-content: center;
      flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    button, a {
      color: #7c6ef0; text-decoration: none; font-size: 1rem;
      padding: 0.7rem 1.2rem; border: 1px solid #7c6ef0; border-radius: 10px;
      transition: background 0.2s, color 0.2s; background: transparent;
      cursor: pointer;
    }
    button:hover, a:hover { background: #7c6ef0; color: #fff; }
    .console {
      text-align: left;
      background: #101321;
      border: 1px solid rgba(124, 110, 240, 0.2);
      border-radius: 12px;
      padding: 1rem;
      min-height: 180px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.92rem;
      color: #cbd2ff;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 1rem;
    }
    .hint {
      color: #7b809c;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello <span>Viewshell</span></h1>
    <p>Native desktop apps powered by web frontends</p>
    <div class="status" id="status">Initializing bridge...</div>
    <div class="hint">
      This page talks to native code through <code>window.__viewshell.invoke(...)</code>.
      Click the buttons and watch the message console update.
    </div>
    <div class="actions">
      <button id="invokePing">Invoke app.ping</button>
      <button id="invokeMissing">Invoke missing command</button>
      <button id="emitEvent">Emit native-ready</button>
      <a href="https://github.com/x93008/viewshell">GitHub</a>
    </div>
    <div class="console" id="console">Waiting for bridge traffic...</div>
  </div>
  <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello Viewshell</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #0f0f1a; color: #e0e0e0;
    }
    .card {
      text-align: center; padding: 3rem 4rem;
      background: #1a1a2e; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    h1 span { color: #7c6ef0; }
    p { font-size: 1.1rem; color: #999; margin-bottom: 1.5rem; }
    .status { font-size: 0.9rem; color: #5ecc72; margin-bottom: 1.5rem; }
    a {
      color: #7c6ef0; text-decoration: none; font-size: 1rem;
      padding: 0.5rem 1.5rem; border: 1px solid #7c6ef0; border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    a:hover { background: #7c6ef0; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello <span>Viewshell</span></h1>
    <p>Native desktop apps powered by web frontends</p>
    <div class="status" id="status">Initializing...</div>
    <a href="https://github.com/x93008/viewshell" target="_blank">GitHub</a>
  </div>
  <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Custom Tray Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: grid; place-items: center; height: 100vh; background: linear-gradient(135deg, #eef4ff, #dbe8ff); }
    .shell { padding: 32px; border-radius: 18px; background: white; box-shadow: 0 20px 60px rgba(62, 124, 250, 0.15); text-align: center; }
    h2 { margin-bottom: 12px; color: #1b2b58; }
    p { color: #5a6a8a; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="shell">
    <h2>Custom Tray Menu Demo</h2>
    <p>Right-click the tray icon to see a<br>custom WebView popup menu.</p>
  </div>
</body>
</html>

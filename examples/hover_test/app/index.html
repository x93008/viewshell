<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; }
    .panel {
      width: 100%; height: 100%;
      border-radius: 12px;
      background: green;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      transition: background-color 200ms;
      user-select: none;
    }
    .panel.hovered {
      background: red;
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">HOVER ME</div>
  <script>
    var panel = document.getElementById('panel');
    var expanded = false;

    panel.addEventListener('mouseenter', function() {
      if (expanded) return;
      expanded = true;
      panel.classList.add('hovered');
      panel.textContent = 'MOUSE IN (RED)';
      if (window.__viewshell) {
        window.__viewshell.invoke('hover.expand', {});
      }
    });

    panel.addEventListener('mouseleave', function() {
      if (!expanded) return;
      expanded = false;
      panel.classList.remove('hovered');
      panel.textContent = 'HOVER ME';
      if (window.__viewshell) {
        window.__viewshell.invoke('hover.shrink', {});
      }
    });
  </script>
</body>
</html>

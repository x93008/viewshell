<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Floating Panel Demo</title>
  <style>
    :root {
      --blue: #3E7CFA;
      --radius: 8px;
      --w-compact: 67px;
      --h-compact: 16px;
      --w-hover: 81px;
      --h-hover: 24px;
      --w-expanded: 424px;
      --h-expanded: 70px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    html { background: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body.floating { background: transparent; overflow: hidden; }
    body.main { display: grid; place-items: center; background: linear-gradient(135deg, #eef4ff, #dbe8ff); }
    .main-shell { padding: 24px; border-radius: 18px; background: white; box-shadow: 0 20px 60px rgba(62, 124, 250, 0.15); }
    .main-shell button { padding: 12px 18px; border: none; border-radius: 12px; background: var(--blue); color: white; cursor: pointer; }

    .floating-shell {
      width: 100%; height: 100%; border-radius: var(--radius);
      background: var(--blue); color: white; position: relative;
      overflow: hidden; user-select: none;
      display: flex; align-items: center; justify-content: center;
      transition: background-color 180ms ease;
    }
    .breathing {
      position: absolute; inset: 0;
      border-radius: var(--radius);
      background: radial-gradient(circle at center, rgba(255,255,255,0.55), rgba(255,255,255,0));
      animation: pulse 1.8s ease-in-out infinite;
    }
    .floating-shell.compact .breathing { opacity: 1; animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.18; transform: scale(0.92); }
      50% { opacity: 0.55; transform: scale(1.08); }
    }
    .floating-shell.hover .breathing,
    .floating-shell.expanded .breathing { animation: none; opacity: 0; }
    .floating-shell.expanded {
      background: white;
      color: #1b2b58;
      justify-content: space-between;
      padding: 16px 20px;
    }
    .floating-label { position: relative; z-index: 1; font-size: 10px; letter-spacing: 0.08em; }
    .floating-shell.expanded .floating-label { font-size: 14px; }
    .toggle-btn {
      display: none;
      position: relative;
      z-index: 1;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      color: white;
      cursor: pointer;
      background: #d93a54;
    }
    .toggle-btn.blue { background: #3E7CFA; }
    .floating-shell.expanded .toggle-btn { display: inline-flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <script src="main.js"></script>
</body>
</html>
